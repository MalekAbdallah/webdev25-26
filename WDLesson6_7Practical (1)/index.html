<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>WD Lesson 6.7 Practical</title>
  <link href="style.css" rel="stylesheet">
  <script src="script.js"></script>
</head>

<body onload="init()">

  <div id="banner" class="container center">
    <div style="text-align:center">
      <h1>NYC Open Data</h1>
      <h2>Motor Vehicle Collisions</h2>
    </div>
  </div>

  <div class="container">

    <div id="leftPanel">
      
      <div class="card">
        <h3>SEARCH By Borough</h3>
        <input type="text" id="borough" placeholder="Enter Borough (ALL CAPS)">
        <hr>
        <a class="button" onclick="filterByBorough()">Search</a>
      </div>

      <div class="card">
        <h3>SEARCH By Zip Code</h3>
        <input type="text" id="zip" placeholder="Enter Zip Code">
        <hr>
        <a class="button" onclick="filterByZip()">Search</a>
      </div>

      <div class="card">
        <h3>SEARCH By Cause</h3>
        <input type="text" id="cause" placeholder="Enter Cause">
        <hr>
        <a class="button" onclick="filterByCause()">Search</a>
      </div>

    </div>

    <div id="rightPanel" class="card">
      <h1>Collision Data</h1>
      <div id="result"></div>
      <div id="output" class="container"></div>
    </div>

  </div>

  <div id="footer" class="container center">
    <h3>Lesson 6.7 Practical</h3>
  </div>

</body>
</html>
